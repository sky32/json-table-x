<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JsonTableX Demo</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body {
      padding: 16px;
    }

    .bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    textarea {
      width: 100%;
      height: 220px;
    }
  </style>
</head>

<body>
  <h1>JsonTableX Demo</h1>
  <div class="bar">
    <select id="view">
      <option value="single">单表</option>
      <option value="multi">多表</option>
    </select>
    <select id="theme">
      <option value="">默认</option>
      <option value="dark" selected>深色</option>
      <option value="light">浅色</option>
      <option value="compact">紧凑</option>
    </select>
    <select id="layout">
      <option value="auto">自动</option>
      <option value="horizontal">横向</option>
      <option value="vertical">纵向</option>
    </select>
    <select id="lang">
      <option value="zh" selected>中文</option>
      <option value="en">English</option>
    </select>
    <label><input type="checkbox" id="allowHtml" />允许HTML</label>
    <label><input type="checkbox" id="single" checked />单元素内联</label>
    <label><input type="checkbox" id="scroll" />子表滚动</label>
    <label>高度(px) <input type="number" id="height" value="260" style="width:80px"></label>
    <button id="render">渲染</button>
    <button id="example">示例</button>
  </div>
  <textarea id="input"></textarea>
  <div id="out" style="margin-top:12px"></div>
  <script src="../dist/json-table-x.min.js"></script>
  <script src="./app.js"></script>
</body>

</html>
